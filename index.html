<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JOB मित्र - All Over India Job Portal</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins', sans-serif}
body{background:#f5f7fa;color:#333}
header{background:linear-gradient(135deg,#2563eb,#1e40af);color:white;text-align:center;padding:20px;position:sticky;top:0;z-index:10}
.filter-bar{display:flex;gap:8px;justify-content:center;margin-top:10px;flex-wrap:wrap}
.filter-btn{background:rgba(255,255,255,0.2);border:1px solid white;color:white;padding:8px 14px;border-radius:20px;font-size:12px;cursor:pointer;font-weight:600}
.filter-btn.active{background:white;color:#2563eb}
.safety-bar{background:#dc2626;color:white;text-align:center;padding:10px;font-weight:600;font-size:14px}
.container{max-width:650px;margin:20px auto;padding:10px}
.job-card{background:white;border-radius:12px;padding:16px;margin-bottom:15px;box-shadow:0 2px 8px rgba(0,0,0,0.1);border-left:4px solid #2563eb;display:block}
.job-title{font-size:18px;font-weight:700;color:#1e40af}
.company{color:#666;font-size:14px;margin:4px 0}
.company span{color:#2563eb;font-weight:600}
.salary{color:#059669;font-weight:600;margin:6px 0;font-size:15px}
.details{margin:8px 0;font-size:13px;line-height:1.7}
.process{background:#f0f9ff;border-left:3px solid #2563eb;padding:8px;margin:8px 0;border-radius:4px;font-size:12px}
.tags{display:flex;gap:6px;flex-wrap:wrap;margin:8px 0}
.tag{background:#e0e7ff;color:#3730a3;padding:4px 10px;border-radius:20px;font-size:11px}
.tag.green{background:#d1fae5;color:#065f46}
.tag.orange{background:#ffedd5;color:#9a3412}
.tag.blue{background:#dbeafe;color:#1e40af}
.apply-btn{width:100%;background:#2563eb;color:white;border:none;padding:12px;border-radius:8px;font-size:16px;font-weight:600;margin-top:10px;cursor:pointer}
.captcha-box{display:none;background:#fef3c7;border:1px solid #f59e0b;padding:12px;border-radius:8px;margin-top:10px;text-align:center}
.captcha-question{font-size:20px;font-weight:700;color:#dc2626;margin-bottom:8px}
footer{padding:20px;text-align:center;font-size:12px;color:#666;background:white;margin-top:20px}
</style>
</head>
<body>

<header>
  <h1>JOB मित्र</h1>
  <p>100% FREE - All Over India Jobs | 10+ Badi Company</p>
  <div class="filter-bar">
    <button class="filter-btn active" onclick="filterAndOpen('all','https://www.naukri.com')">Sabhi Job</button>
    <button class="filter-btn" onclick="filterAndOpen('wfh','https://www.naukri.com/work-from-home-jobs')">WFH Job</button>
    <button class="filter-btn" onclick="filterAndOpen('mobile','https://www.apna.co/jobs')">Mobile Wali</button>
    <button class="filter-btn" onclick="filterAndOpen('allindia','https://www.naukri.com')">All India</button>
  </div>
</header>

<div class="safety-bar">
  ⚠️ SAVDHAN: Koi bhi job ke liye 1 rupya bhi mat dena. Ye portal bilkul FREE hai.
</div>

<div class="container" id="jobList"></div>

<footer>
  <p><b>Disclaimer:</b> Hum sirf job ka link dete hai. Job dene wali company hai.</p>
  <p>Contact: jobmitra@gmail.com</p>
</footer>

<script>
const jobs = [
  {title:"BPO Telecaller WFH", company:"Quess Corp", platform:"Naukri.com", salary:"₹15,000 - ₹22,000", location:"All Over India", type:"Full Time", qualification:"10th Pass", experience:"Fresher", age:"18-35", pf:"PF Haan", work:"Mobile + Laptop", process:"1. Apply → 2. Naukri Signup → 3. HR Call → 4. Joining", link:"https://www.naukri.com/job-listings-bpo-telecaller-work-from-home-quess-corp-", tags:["wfh","mobile","allindia"]},
  {title:"Amazon Customer Support", company:"Amazon", platform:"Amazon Jobs", salary:"₹18,000 - ₹25,000", location:"All Over India", type:"Full Time", qualification:"12th + English", experience:"Fresher", age:"18-30", pf:"PF Haan", work:"Laptop + Internet", process:"1. Apply → 2. Amazon Test → 3. Interview → 4. Offer Letter", link:"https://www.amazon.jobs/en/jobs", tags:["wfh","allindia"]},
  {title:"Field Sales Executive", company:"Flipkart", platform:"Apna App", salary:"₹20,000 + Incentive", location:"All Over India", type:"Full Time", qualification:"10th Pass", experience:"0-3 Years", age:"18-40", pf:"PF Haan", work:"Mobile + Bike", process:"1. Apply → 2. Apna Call → 3. Interview → 4. Joining", link:"https://www.apna.co/jobs/flipkart-sales-jobs", tags:["mobile","allindia"]},
  {title:"Data Entry Operator WFH", company:"Tata BSS", platform:"Naukri.com", salary:"₹12,000 - ₹18,000", location:"All Over India", type:"Part Time", qualification:"10th Pass", experience:"Fresher", age:"18-35", pf:"PF Nahi", work:"Laptop Must", process:"1. Apply → 2. Test → 3. Training → 4. Work Start", link:"https://www.naukri.com/data-entry-work-from-home-jobs", tags:["wfh","allindia"]},
  {title:"Insurance Agent", company:"LIC", platform:"Apna App", salary:"₹25,000 + Commission", location:"All Over India", type:"Full Time", qualification:"12th Pass", experience:"0-2 Years", age:"21-45", pf:"PF Nahi", work:"Mobile", process:"1. Apply → 2. LIC Training → 3. IRDA Exam → 4. Code Milta Hai", link:"https://www.apna.co/jobs/insurance-agent-jobs", tags:["mobile","allindia"]},
  {title:"Bank DSA / Loan Agent", company:"HDFC Bank", platform:"Naukri.com", salary:"₹18,000 + Incentive", location:"All Over India", type:"Full Time", qualification:"12th Pass", experience:"Fresher", age:"21-40", pf:"PF Haan", work:"Mobile + Bike", process:"1. Apply → 2. Bank Interview → 3. DSA Code → 4. Loan Karo", link:"https://www.naukri.com/bank-dsa-jobs", tags:["mobile","allindia"]},
  {title:"Flipkart Delivery Executive", company:"Flipkart", platform:"Apna App", salary:"₹15,000 - ₹20,000", location:"All Over India", type:"Full Time", qualification:"10th Pass", experience:"Fresher", age:"18-40", pf:"PF Haan", work:"Mobile + Bike", process:"1. Apply → 2. Document Check → 3. Bike Training → 4. Joining", link:"https://www.apna.co/jobs/flipkart-delivery-jobs", tags:["mobile","allindia"]},
  {title:"Swiggy Delivery Boy", company:"Swiggy", platform:"WorkIndia", salary:"₹18,000 - ₹25,000", location:"All Over India", type:"Part Time", qualification:"8th Pass", experience:"Fresher", age:"18-35", pf:"PF Nahi", work:"Mobile + Bike", process:"1. Apply → 2. WorkIndia Signup → 3. Bag Milega → 4. Delivery Start", link:"https://www.workindia.in", tags:["mobile","allindia"]},
  {title:"Zomato Delivery Partner", company:"Zomato", platform:"WorkIndia", salary:"₹18,000 - ₹24,000", location:"All Over India", type:"Part Time", qualification:"8th Pass", experience:"Fresher", age:"18-35", pf:"PF Nahi", work:"Mobile + Bike", process:"1. Apply → 2. Zomato App Download → 3. Training → 4. Joining", link:"https://www.workindia.in", tags:["mobile","allindia"]},
  {title:"Hospital Receptionist", company:"Apollo Hospital", platform:"Naukri.com", salary:"₹10,000 - ₹14,000", location:"All Over India", type:"Full Time", qualification:"12th Pass", experience:"0-1 Years", age:"18-30", pf:"PF Haan", work:"Office", process:"1. Apply → 2. Interview → 3. Document → 4. Joining", link:"https://www.naukri.com/hospital-receptionist-jobs", tags:["allindia"]},
  {title:"Retail Sales Executive", company:"Reliance Trends", platform:"Apna App", salary:"₹14,000 - ₹18,000", location:"All Over India", type:"Full Time", qualification:"10th Pass", experience:"Fresher", age:"18-35", pf:"PF Haan", work:"Office", process:"1. Apply → 2. Store Interview → 3. Training → 4. Joining", link:"https://www.apna.co/jobs/reliance-retail-jobs", tags:["allindia"]},
  {title:"Driver - Cab", company:"Ola/Uber", platform:"Quikr Jobs", salary:"₹20,000 - ₹30,000", location:"All Over India", type:"Full Time", qualification:"8th Pass", experience:"1 Year License", age:"21-45", pf:"PF Nahi", work:"Mobile + Car", process:"1. Apply → 2. Document Upload → 3. Car Check → 4. Ride Start", link:"https://www.quikrjobs.com", tags:["mobile","allindia"]},
  {title:"Factory Helper", company:"ITC Factory", platform:"WorkIndia", salary:"₹12,000 - ₹16,000", location:"All Over India", type:"Full Time", qualification:"8th Pass", experience:"Fresher", age:"18-40", pf:"PF Haan", work:"Factory", process:"1. Apply → 2. WorkIndia Call → 3. Medical → 4. Joining", link:"https://www.workindia.in", tags:["allindia"]},
  {title:"Tele Sales WFH", company:"Bajaj Finance", platform:"Indeed", salary:"₹15,000 + Incentive", location:"All Over India", type:"Full Time", qualification:"12th Pass", experience:"Fresher", age:"18-35", pf:"PF Haan", work:"Mobile + Laptop", process:"1. Apply → 2. Indeed Signup → 3. Interview → 4. Training", link:"https://in.indeed.com", tags:["wfh","mobile","allindia"]},
  {title:"Security Guard", company:"G4S", platform:"Quikr Jobs", salary:"₹13,000 - ₹16,000", location:"All Over India", type:"Full Time", qualification:"8th Pass", experience:"Fresher", age:"18-45", pf:"PF Haan", work:"Office", process:"1. Apply → 2. Physical → 3. Training → 4. Posting", link:"https://www.quikrjobs.com", tags:["allindia"]},
  {title:"Content Writer WFH", company:"Freelance", platform:"LinkedIn", salary:"₹10,000 - ₹20,000", location:"All Over India", type:"Part Time", qualification:"12th Pass", experience:"Fresher", age:"18-40", pf:"PF Nahi", work:"Laptop + Mobile", process:"1. Apply → 2. LinkedIn Profile → 3. Sample → 4. Work Start", link:"https://www.linkedin.com/jobs", tags:["wfh","mobile","allindia"]},
  {title:"Warehouse Worker", company:"Amazon", platform:"Amazon Jobs", salary:"₹16,000 - ₹19,000", location:"All Over India", type:"Full Time", qualification:"10th Pass", experience:"Fresher", age:"18-35", pf:"PF Haan", work:"Warehouse", process:"1. Apply → 2. Amazon Test → 3. Joining → 4. Training", link:"https://www.amazon.jobs/en/jobs", tags:["allindia"]},
  {title:"Online Tutor WFH", company:"Vedantu", platform:"Indeed", salary:"₹20,000 - ₹35,000", location:"All Over India", type:"Part Time", qualification:"Graduate", experience:"0-2 Years", age:"20-40", pf:"PF Nahi", work:"Laptop + Mobile", process:"1. Apply → 2. Demo Class → 3. Training → 4. Teaching", link:"https://in.indeed.com", tags:["wfh","mobile","allindia"]}
];

const jobList = document.getElementById('jobList');

function renderJobs(){
  jobList.innerHTML = '';
  jobs.forEach((job, i)=>{
    let random1 = Math.floor(Math.random() * 9) + 1;
    let random2 = Math.floor(Math.random() * 9) + 1;
    let answer = random1 + random2;

    jobList.innerHTML += `
    <div class="job-card" data-tags="${job.tags.join(' ')}">
      <div class="job-title">${job.title}</div>
      <div class="company">Company: <span>${job.company}</span> | Via: <span>${job.platform}</span></div>
      <div class="salary">Salary: ${job.salary}</div>

      <div class="details">
        <b>Qualification:</b> ${job.qualification}<br>
        <b>Experience:</b> ${job.experience}<br>
        <b>Age:</b> ${job.age}<br>
        <b>Kaam kaise:</b> ${job.work}
      </div>

      <div class="process">
        <b>Joining Process:</b><br>${job.process}
      </div>

      <div class="tags">
        <span class="tag">${job.location}</span>
        <span class="tag">${job.type}</span>
        <span class="tag ${job.pf=='PF Haan'?'green':'orange'}">${job.pf}</span>
        <span class="tag blue">Bilkul FREE</span>
      </div>
      <button class="apply-btn" onclick="showCaptcha(${i},${answer},${random1},${random2})">Apply Now - Direct Link</button>
      <div class="captcha-box" id="captcha${i}">
        <p class="captcha-question">Robot Check: ${random1} + ${random2} =?</p>
        <input type="number" id="ans${i}" style="padding:6px;width:60px">
        <button onclick="goToJob(${i},${answer})" style="padding:6px 12px;background:#10b981;color:white;border:none;border-radius:6px">Submit</button>
      </div>
    </div>
    `
  });
}

function showCaptcha(i,ans,r1,r2){
  document.getElementById('captcha'+i).style.display='block';
}

function goToJob(i,correctAns){
  let ans = document.getElementById('ans'+i).value;
  if(ans == correctAns){
    window.open(jobs[i].link, '_blank');
  }else{
    alert('Galat jawab. Fir se try karo');
  }
}

function filterAndOpen(type, directLink){
  document.querySelectorAll('.filter-btn').forEach(btn=>btn.classList.remove('active'));
  event.target.classList.add('active');

  document.querySelectorAll('.job-card').forEach(card=>{
    if(type == 'all'){
      card.style.display = 'block';
    }else{
      if(card.dataset.tags.includes(type)){
        card.style.display = 'block';
      }else{
        card.style.display = 'none';
      }
    }
  });

  if(type!= 'all'){
    window.open(directLink, '_blank');
  }
}

renderJobs();
</script>

</body>
</html>
